# Production overrides — all secrets via Railway env vars
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# HikariCP — Railway PostgreSQL free tier has 25 connection limit
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Flyway — run migrations on deploy
spring.flyway.enabled=true

# JPA — validate schema only in prod (Flyway manages DDL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Actuator — expose health endpoint only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging — less verbose in prod
logging.level.root=WARN
logging.level.de.baier.familyadmin=INFO

# JWT / OAuth2 — RSA key pair from env vars
# spring.security.oauth2.resourceserver.jwt.issuer-uri is set via env if using external IdP
# For self-issued JWT, configure via application code

# CORS — frontend URL from env
app.frontend-url=${APP_FRONTEND_URL}

# Mail (Resend SMTP)
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
