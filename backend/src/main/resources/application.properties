spring.application.name=FamilyAdmin

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# HikariCP — tune for Railway free tier (max 5 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Flyway — manages schema migrations (never use ddl-auto=update in production)
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Meta WhatsApp Cloud API
meta.whatsapp.token=${META_WHATSAPP_TOKEN}
meta.whatsapp.phone-number-id=${META_WHATSAPP_PHONE_NUMBER_ID}
meta.whatsapp.verify-token=${META_WHATSAPP_VERIFY_TOKEN}

# Virtual threads (Java 21) — fix SecurityContextHolder ThreadLocal issue
spring.threads.virtual.enabled=true
spring.security.strategy=MODE_INHERITABLETHREADLOCAL

# Multipart file upload limits (100MB for Paprika exports with photos)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
