services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: familyadmin
      POSTGRES_USER: familyadmin
      POSTGRES_PASSWORD: familyadmin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyadmin"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
